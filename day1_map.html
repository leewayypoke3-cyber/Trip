<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#d97706">
<title>Day 1 (5/2 토) — 하카타 워밍업</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --c-day:#d97706;
  --c-day-dark:#b45309;
  --header-h:60px;
  --sheet-collapsed:104px;
}
*{box-sizing:border-box}
body,html{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
#map{position:absolute;top:calc(var(--header-h) + env(safe-area-inset-top));left:0;right:0;bottom:0}

/* 헤더 */
.hdr{position:fixed;top:0;left:0;right:0;background:var(--c-day);color:#fff;padding:8px 16px;padding-top:calc(8px + env(safe-area-inset-top));z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.15);height:calc(var(--header-h) + env(safe-area-inset-top));display:flex;flex-direction:column;justify-content:center}
.hdr h1{margin:0;font-size:15px;font-weight:700;line-height:1.25}
.hdr p{margin:3px 0 0;font-size:11px;opacity:.92;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 일자 네비게이션 */
.day-nav{position:fixed;top:calc(var(--header-h) + env(safe-area-inset-top) + 8px);left:50%;transform:translateX(-50%);z-index:998;display:flex;gap:4px;background:rgba(255,255,255,.95);padding:4px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.15);backdrop-filter:blur(8px);max-width:calc(100vw - 24px);overflow-x:auto;-webkit-overflow-scrolling:touch}
.day-nav::-webkit-scrollbar{display:none}
.day-nav a{flex:none;padding:5px 12px;font-size:11px;font-weight:600;color:#6b7280;text-decoration:none;border-radius:14px;transition:all .15s;white-space:nowrap}
.day-nav a.active{background:var(--c-day);color:#fff}
.day-nav a.ov{color:#1f2937}

/* 위치 버튼 */
.loc-btn{position:fixed;right:12px;bottom:calc(var(--sheet-collapsed) + 12px + env(safe-area-inset-bottom));width:46px;height:46px;border-radius:50%;background:#fff;border:none;box-shadow:0 2px 10px rgba(0,0,0,.2);z-index:998;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:bottom .3s ease}
.loc-btn:active{transform:scale(.92)}
.loc-btn svg{width:22px;height:22px}
.loc-btn.active svg{stroke:var(--c-day)}

/* 하단 시트 */
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12);z-index:999;transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:78vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet.collapsed{transform:translateY(calc(100% - var(--sheet-collapsed) - env(safe-area-inset-bottom)))}
.handle-area{flex:none;padding:10px 0 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;touch-action:none}
.handle{width:40px;height:4px;background:#d1d5db;border-radius:2px}
.sheet-head{flex:none;padding:6px 18px 12px;display:flex;justify-content:space-between;align-items:baseline;cursor:pointer}
.sheet-title{font-size:12px;color:#6b7280;letter-spacing:1.3px;text-transform:uppercase;font-weight:600}
.sheet-count{font-size:11px;color:#9ca3af}
.sheet-body{flex:1;overflow-y:auto;padding:0 12px 16px;-webkit-overflow-scrolling:touch}

/* 정지 카드 */
.stop{padding:11px 12px;margin-bottom:6px;border-radius:10px;background:#f9fafb;border-left:3px solid var(--c);display:flex;gap:10px;cursor:pointer;transition:background .15s}
.stop:active{background:#f3f4f6}
.stop.focus{background:#fef3c7;border-left-width:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stop-num{flex:none;width:26px;height:26px;line-height:26px;text-align:center;background:var(--c);color:#fff;border-radius:50%;font-size:12px;font-weight:700}
.stop-body{flex:1;min-width:0}
.stop-time{font-size:10.5px;color:#9ca3af;font-weight:600;letter-spacing:.3px}
.stop-name{font-size:14px;font-weight:600;color:#111;margin-top:2px;line-height:1.3}
.stop-note{font-size:11.5px;color:#6b7280;margin-top:4px;line-height:1.5}

/* 핀 */
.marker-num{width:32px;height:32px;line-height:32px;text-align:center;color:#fff;border-radius:50%;font-weight:700;font-size:14px;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.marker-num.pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

/* 위치 마커 */
.user-marker{width:18px;height:18px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 4px rgba(59,130,246,.25)}

/* 데스크탑 */
@media(min-width:701px){
  :root{--header-h:64px}
  .sheet{left:auto;right:16px;bottom:16px;top:88px;width:340px;max-height:none;border-radius:8px;transform:none!important;padding-bottom:0}
  .sheet.collapsed{transform:none!important}
  .handle-area{display:none}
  .sheet-head{padding:14px 16px 8px;cursor:default}
  .sheet-body{padding:0 14px 14px}
  .loc-btn{bottom:24px}
  .day-nav{top:80px}
  .hdr h1{font-size:18px}
  .hdr p{font-size:12px}
}
</style>
</head>
<body>
<div class="hdr">
  <h1>Day 1 · 5/2 (토) — 하카타 워밍업</h1>
  <p>부산 14:50 → 후쿠오카 16:00 · 캐널시티 + 모츠나베</p>
</div>
<nav class="day-nav">
  <a href="overview.html" class="ov">📋 전체</a>
  <a href="day1_map.html" class="active">Day 1</a>
  <a href="day2_map.html" >Day 2</a>
  <a href="day3_map.html" >Day 3</a>
</nav>
<div id="map"></div>

<button class="loc-btn" id="locBtn" aria-label="내 위치">
  <svg viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
  </svg>
</button>

<div class="sheet collapsed" id="sheet">
  <div class="handle-area" id="handle"><div class="handle"></div></div>
  <div class="sheet-head" id="sheetHead">
    <span class="sheet-title">오늘의 동선</span>
    <span class="sheet-count" id="count"></span>
  </div>
  <div class="sheet-body" id="stops"></div>
</div>

<script>
const STOPS=[{"n": 1, "pos": [33.5933, 130.4467], "name": "후쿠오카 공항 (국제선)", "time": "16:00 도착", "note": "입국심사 + 짐 찾기", "type": "airport"}, {"n": 2, "pos": [33.5897, 130.4204], "name": "하카타역", "time": "17:00", "note": "공항선 지하철 5분", "type": "station"}, {"n": 3, "pos": [33.5934, 130.4136], "name": "도미인 하카타 기온", "time": "17:30", "note": "체크인 + 짐 풀기", "type": "hotel"}, {"n": 4, "pos": [33.5897, 130.4112], "name": "캐널시티 하카타", "time": "18:00~21:00", "note": "1F 오니츠카 타이거 + 5F 모츠나베 오오야마 (저녁)", "type": "shopping"}, {"n": 5, "pos": [33.5934, 130.4136], "name": "호텔 복귀", "time": "21:30", "note": "야식 라멘 + 천연온천", "type": "hotel"}];
const SEGS=[{"from": 0, "to": 1, "style": "subway"}, {"from": 1, "to": 2, "style": "walk"}, {"from": 2, "to": 3, "style": "walk"}, {"from": 3, "to": 4, "style": "walk"}];
const COLORS={"airport": "#3b82f6", "station": "#3b82f6", "hotel": "#10b981", "shopping": "#ec4899", "food": "#ef4444"};
const INIT_CENTER=[33.591, 130.425];
const INIT_ZOOM=14;

const map=L.map('map',{zoomControl:false}).setView(INIT_CENTER,INIT_ZOOM);
L.control.zoom({position:'topleft'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);

const sb=document.getElementById('stops');
const markers={};
document.getElementById('count').textContent=STOPS.length+'개 정지';

STOPS.forEach(s=>{
  const c=COLORS[s.type]||'#6b7280';
  const div=document.createElement('div');
  div.className='stop';div.style.setProperty('--c',c);div.dataset.n=s.n;
  div.innerHTML=`<div class="stop-num">${s.n}</div><div class="stop-body"><div class="stop-time">${s.time}</div><div class="stop-name">${s.name}</div><div class="stop-note">${s.note}</div></div>`;
  div.onclick=()=>focusStop(s.n);
  sb.appendChild(div);
  const marker=L.marker(s.pos,{icon:L.divIcon({html:`<div class="marker-num" style="background:${c}">${s.n}</div>`,className:'',iconSize:[32,32],iconAnchor:[16,16]})}).addTo(map).bindPopup(`<b>${s.name}</b><br><small style="color:#888">${s.time}</small><br>${s.note}`);
  marker.on('click',()=>focusStop(s.n));
  markers[s.n]=marker;
});

SEGS.forEach(seg=>{
  const a=STOPS[seg.from].pos,b=STOPS[seg.to].pos;
  const opts={subway:{color:'#3b82f6',weight:3,opacity:.7,dashArray:'8 6'},walk:{color:'#9ca3af',weight:3,opacity:.8},bus:{color:'#16a34a',weight:4,opacity:.7,dashArray:'10 6'},bike:{color:'#f97316',weight:5,opacity:.85}}[seg.style];
  L.polyline([a,b],opts).addTo(map);
});

const padding=window.innerWidth>700?[60,360,60,60]:[80,40,160,40];
map.fitBounds(L.latLngBounds(STOPS.map(s=>s.pos)),{padding});

function focusStop(n){
  const stop=STOPS.find(s=>s.n===n);
  if(!stop)return;
  document.querySelectorAll('.stop').forEach(el=>el.classList.toggle('focus',+el.dataset.n===n));
  document.querySelectorAll('.marker-num').forEach(el=>el.classList.remove('pulse'));
  const mEl=markers[n].getElement()?.querySelector('.marker-num');
  if(mEl)mEl.classList.add('pulse');
  map.setView(stop.pos,Math.max(map.getZoom(),15),{animate:true});
  markers[n].openPopup();
  const sheet=document.getElementById('sheet');
  if(sheet.classList.contains('collapsed')&&window.innerWidth<=700){
    sheet.classList.remove('collapsed');
  }
  const card=document.querySelector(`.stop[data-n="${n}"]`);
  if(card)setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),300);
}

const sheet=document.getElementById('sheet');
const handle=document.getElementById('handle');
const sheetHead=document.getElementById('sheetHead');
function toggle(){sheet.classList.toggle('collapsed')}
handle.onclick=toggle;
sheetHead.onclick=toggle;

// 시트 드래그(모바일)
let dragStartY=null,dragStartCollapsed=false;
handle.addEventListener('touchstart',e=>{dragStartY=e.touches[0].clientY;dragStartCollapsed=sheet.classList.contains('collapsed')},{passive:true});
handle.addEventListener('touchend',e=>{
  if(dragStartY===null)return;
  const dy=e.changedTouches[0].clientY-dragStartY;
  if(Math.abs(dy)>20){
    if(dy<0)sheet.classList.remove('collapsed');
    else if(dy>0)sheet.classList.add('collapsed');
  }
  dragStartY=null;
},{passive:true});

let userMarker=null,userCircle=null,watchId=null;
const locBtn=document.getElementById('locBtn');
locBtn.onclick=()=>{
  if(!navigator.geolocation){alert('위치 서비스를 사용할 수 없어요');return}
  if(watchId!==null){
    navigator.geolocation.clearWatch(watchId);watchId=null;
    locBtn.classList.remove('active');
    if(userMarker){map.removeLayer(userMarker);userMarker=null}
    if(userCircle){map.removeLayer(userCircle);userCircle=null}
    return;
  }
  locBtn.classList.add('active');
  watchId=navigator.geolocation.watchPosition(p=>{
    const ll=[p.coords.latitude,p.coords.longitude];
    if(userMarker){userMarker.setLatLng(ll);userCircle.setLatLng(ll).setRadius(p.coords.accuracy)}
    else{
      userMarker=L.marker(ll,{icon:L.divIcon({html:'<div class="user-marker"></div>',className:'',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
      userCircle=L.circle(ll,{radius:p.coords.accuracy,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:.1,weight:1}).addTo(map);
      map.setView(ll,16);
    }
  },err=>{
    locBtn.classList.remove('active');watchId=null;
    alert('위치를 가져올 수 없어요: '+err.message);
  },{enableHighAccuracy:true,timeout:10000,maximumAge:5000});
};
</script>
</body>
</html>
