<title>전체 일정 — 후쿠오카 3박 4일</title>
<style>
:root{
  --header-h:60px;
}
*{box-sizing:border-box}
body,html{margin:0;padding:0;height:100%;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;background:#f3f4f6}

/* 헤더 */
.hdr{position:sticky;top:0;left:0;right:0;background:#1f2937;color:#fff;padding:8px 16px;padding-top:calc(8px + env(safe-area-inset-top));z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;flex-direction:column;justify-content:center;min-height:calc(var(--header-h) + env(safe-area-inset-top))}
.hdr h1{margin:0;font-size:15px;font-weight:700;line-height:1.25}
.hdr p{margin:3px 0 0;font-size:11px;opacity:.85;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 네비게이션 (다른 페이지로) */
.page-nav{position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top));left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);box-shadow:0 1px 3px rgba(0,0,0,.06);z-index:99;padding:8px 12px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.page-nav a{flex:none;padding:6px 12px;font-size:11.5px;font-weight:600;color:#6b7280;text-decoration:none;border-radius:14px;transition:all .15s;border:1px solid #e5e7eb;background:#fff;white-space:nowrap}
.page-nav a.active{background:#1f2937;color:#fff;border-color:#1f2937}
.page-nav a.d1{color:#d97706}
.page-nav a.d2{color:#16a34a}
.page-nav a.d3{color:#2563eb}

/* Day 점프 버튼 (SVG 내부 영역으로) */
.jump-nav{position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top) + 45px);background:rgba(255,255,255,.96);backdrop-filter:blur(8px);z-index:98;padding:8px 12px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid #e5e7eb}
.jump-nav button{flex:none;padding:6px 12px;font-size:11px;font-weight:700;border:none;border-radius:12px;cursor:pointer;color:#fff;white-space:nowrap;font-family:inherit}
.jump-nav button:active{transform:scale(.96)}
.jump-d1{background:#d97706}
.jump-d2{background:#16a34a}
.jump-d3{background:#2563eb}
.jump-d4{background:#475569}

/* 안내 토스트 */
.tip{position:fixed;left:12px;right:12px;top:calc(var(--header-h) + env(safe-area-inset-top) + 100px);background:#1f2937;color:#fff;padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.5;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;justify-content:space-between;align-items:center;gap:10px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.tip .close-x{flex:none;background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px;font-family:inherit}
.tip-text{flex:1}
.tip-text b{color:#fbbf24}

/* SVG 컨테이너 — 가로 스크롤 가능 */
.svg-wrap{padding:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.svg-wrap svg{display:block;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* 모바일: SVG는 화면 폭에 맞추되, 핀치 줌으로 확대 */
@media(max-width:700px){
  .svg-wrap svg{width:100%;height:auto;min-width:100%}
}

/* 데스크탑: SVG 원본 비율 유지하되 컨테이너 폭 제한 */
@media(min-width:701px){
  :root{--header-h:64px}
  .hdr h1{font-size:18px}
  .hdr p{font-size:12px}
  .svg-wrap{padding:20px;max-width:1540px;margin:0 auto}
  .svg-wrap svg{width:100%;height:auto}
  .jump-nav{justify-content:center}
}

/* 푸터 */
.footer{padding:16px;text-align:center;color:#9ca3af;font-size:11px;line-height:1.5}
.footer a{color:#6b7280;text-decoration:none;font-weight:600}
</style>

<script>
// 안내 토스트 — 5초 후 자동 닫기
let tipTimer = setTimeout(closeTip, 5000);
function closeTip(){
  const t = document.getElementById('tip');
  if(t){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)}
  clearTimeout(tipTimer);
}

// Day 점프 — SVG 내부 y좌표를 실제 픽셀 위치로 변환해서 스크롤
function jumpTo(svgY){
  const svg = document.getElementById('overview');
  const wrap = document.getElementById('wrap');
  const rect = svg.getBoundingClientRect();
  // SVG viewBox 1380 → 실제 렌더 높이 비율
  const ratio = rect.height / 1380;
  const targetY = svgY * ratio + rect.top + window.scrollY;
  // 헤더(스티키) 높이만큼 보정
  const headerOffset = document.querySelector('.hdr').offsetHeight + document.querySelector('.page-nav').offsetHeight + document.querySelector('.jump-nav').offsetHeight + 8;
  window.scrollTo({top: targetY - headerOffset, behavior:'smooth'});
}
</script>
